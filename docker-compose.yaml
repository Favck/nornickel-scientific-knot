services:
  neo4j:
    image: neo4j:5.11.0 
    ports:
      - "${NEO4J_HTTP_PORT}:7474" 
      - "${NEO4J_BOLT_PORT}:7687" 
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD} 
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: always
  
  neo4j-init:
    image: neo4j:5.11.0
    profiles: ["tools"]
    depends_on:
      neo4j:
        condition: service_healthy 
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations 
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    command: >
      bash -c "cypher-shell -a neo4j://neo4j:7687 -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} -f /migrations/init.cypher"
